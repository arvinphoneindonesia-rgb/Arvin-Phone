<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ARVIN | Trusted Phones, Honest Deals</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFFFFF;
            color: #000000;
            font-family: 'Inter', 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.4;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700;800&display=swap');

        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
        }

        .splash-logo {
            max-width: 10000px;
            width: 5000%;
            animation: logoPop 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        .splash-logo img {
            width: 100%;
            height: auto;
            display: block;
        }

        @keyframes logoPop {
            0% {
                opacity: 0;
                transform: scale(0.7);
            }
            60% {
                opacity: 1;
                transform: scale(1.05);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }


        .splash-screen.hide {
            opacity: 0;
            visibility: hidden;
        }


        .main-content {
            opacity: 0;
            transition: opacity 0.8s ease-out;
        }

        .main-content.visible {
            opacity: 1;
        }


        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(24px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-up {
            animation: fadeUp 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
        }

        .navbar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 28px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 16px;
        }

        .logo {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            text-decoration: none;
            color: #000;
            transition: opacity 0.2s ease;
        }
        .logo:hover {
            opacity: 0.7;
        }

        .hero {
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 80px 20px 60px;
        }
        .hero h1 {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 24px;
            line-height: 1.1;
        }
        .hero-sub {
            font-family: 'Inter', sans-serif;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 500;
            margin-bottom: 16px;
            letter-spacing: -0.3px;
            color: #1f1f1f;
        }
        .hero-tagline {
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 48px;
            color: #4a4a4a;
        }
        .btn-primary {
            display: inline-block;
            background: #000000;
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            padding: 16px 42px;
            border-radius: 40px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid #000;
            cursor: pointer;
            letter-spacing: 0.3px;
        }
        .btn-primary:hover {
            background: #FFFFFF;
            color: #000000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transform: translateY(-2px);
        }

        .footer {
            text-align: center;
            padding: 48px 20px 40px;
            border-top: 1px solid #efefef;
            margin-top: 60px;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 400;
            color: #2c2c2c;
            letter-spacing: 0.3px;
        }

        @media (max-width: 540px) {
            .hero {
                min-height: 70vh;
                padding: 40px 16px;
            }
            .btn-primary {
                padding: 14px 32px;
            }
            .navbar {
                padding: 20px 0;
            }
            .splash-logo {
                max-width: 150px;
            }
        }
    </style>
</head>
<body>


<div class="splash-screen" id="splashScreen">
    <div class="splash-logo">
        <img src="arvin.jpg" alt="ARVIN PHONE" onerror="this.src='https://placehold.co/200x80/000/white?text=ARVIN'">
    </div>
</div>


<div class="main-content" id="mainContent">
    <div class="container">
        <nav class="navbar">
            <a href="index.html" class="logo">ARVIN</a>
        </nav>
    </div>

    <main>
        <div class="hero">
            <h1 class="animate-fade-up">ARVIN</h1>
            <div class="hero-sub animate-fade-up" style="animation-delay: 0.08s;">Trusted Phones, Honest Deals</div>
            <div class="hero-tagline animate-fade-up" style="animation-delay: 0.12s;">#1 Trusted Phone Partner</div>
            <a href="catalog.html" class="btn-primary animate-fade-up" style="animation-delay: 0.2s;">SHOP NOW</a>
        </div>
    </main>

    <footer class="footer">
        ARVIN PHONE INDONESIA
    </footer>
</div>

<script>


    const splash = document.getElementById('splashScreen');
    const mainContent = document.getElementById('mainContent');


    setTimeout(() => {
        splash.classList.add('hide');
        

        setTimeout(() => {
            mainContent.classList.add('visible');

            setTimeout(() => {
                splash.style.display = 'none';
            }, 300);
        }, 600);
    }, 2500); 
</script>

</body>
</html>
