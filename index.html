<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Arvin Phone · Premium Store</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      color: #000000;
      line-height: 1.5;
      min-height: 100vh;
      opacity: 0;
      animation: contentFadeIn 0.8s ease-out 2.3s forwards;
    }

    @keyframes contentFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* Splash */
    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: splashFadeOut 0.6s ease-in-out 2.2s forwards;
      pointer-events: none;
    }

    #splash img {
      width: 180px;
      height: auto;
      object-fit: contain;
      filter: brightness(0) invert(1);
      animation: logoZoomFade 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes logoZoomFade {
      0% { opacity: 0; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.05); }
      70% { opacity: 1; transform: scale(1); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes splashFadeOut {
      0% { opacity: 1; visibility: visible; }
      100% { opacity: 0; visibility: hidden; }
    }

    /* Navbar */
    .navbar {
      background: #ffffff;
      border-bottom: 1px solid #e5e5e5;
      padding: 1.2rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #000000;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .logo img {
      height: 28px;
      width: auto;
      filter: brightness(0);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2rem;
      text-align: center;
    }

    /* Hero */
    .store-header {
      margin-bottom: 3rem;
      text-align: center;
    }

    .store-header h1 {
      font-size: 3.5rem;
      font-weight: 300;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .store-header p {
      color: #666666;
      font-size: 1.2rem;
      font-weight: 300;
    }

    /* Product Grid */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2.5rem;
      margin-top: 1rem;
    }

    .product-card {
      background: #ffffff;
      border-radius: 32px;
      padding: 2rem 1.8rem 2.2rem;
      border: 1px solid #e5e5e5;
      transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
      display: flex;
      flex-direction: column;
      text-align: center;
    }

    .product-card:hover {
      transform: translateY(-6px);
      border-color: #000000;
      box-shadow: 0 30px 40px -15px rgba(0,0,0,0.04);
    }

    .product-img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 24px;
      background: #f5f5f5;
      margin-bottom: 1.8rem;
      border: 1px solid #eeeeee;
      transition: transform 0.3s ease;
    }

    .product-card:hover .product-img {
      transform: scale(1.01);
    }

    .product-title {
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
    }

    .product-price {
      font-size: 1.9rem;
      font-weight: 300;
      margin-bottom: 1.2rem;
      color: #000000;
    }

    .product-desc {
      color: #666666;
      margin-bottom: 2rem;
      font-size: 0.95rem;
      line-height: 1.6;
      flex: 1;
    }

    .wa-btn {
      background: #000000;
      color: #ffffff;
      border: none;
      border-radius: 50px;
      padding: 1rem 1.5rem;
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
      text-decoration: none;
      display: block;
      border: 1.5px solid #000000;
      margin-top: auto;
    }

    .wa-btn:hover {
      background: #333333;
      border-color: #333333;
      transform: scale(1.02);
    }

    .empty-message {
      text-align: center;
      padding: 5rem 2rem;
      font-size: 1.2rem;
      color: #999999;
      font-weight: 300;
    }

    footer {
      margin-top: 5rem;
      text-align: center;
      color: #999999;
      font-size: 0.85rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .navbar { padding: 1rem; }
      .container { padding: 2rem 1.2rem; }
      .store-header h1 { font-size: 2.5rem; }
      .product-grid { gap: 1.5rem; }
    }
  </style>
</head>
<body>
<!-- Splash -->
<div id="splash">
  <img src="arvin.jpg" alt="Arvin Logo">
</div>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar-container">
    <a href="#" class="logo">
      <img src="arvin.jpg" alt="Arvin">
      ARVIN PHONE
    </a>
  </div>
</nav>

<main class="container">
  <div class="store-header">
    <h1>Koleksi Premium.</h1>
    <p>Desain minimalis, performa maksimal.</p>
  </div>

  <div id="productGrid" class="product-grid">
    <div class="empty-message">Memuat koleksi...</div>
  </div>
  
  <footer>© Arvin Phone — Esensi dalam genggaman</footer>
</main>

<script>
  // ---------- FIREBASE CONFIG (PLACEHOLDER) ----------
 const firebaseConfig = {
  apiKey: "AIzaSyBc9IX_AEFDNyiA2Klm4RGdbHYmqfXEbOc",
  authDomain: "arvin-phone.firebaseapp.com",
  databaseURL: "https://arvin-phone-default-rtdb.firebaseio.com",
  projectId: "arvin-phone",
  storageBucket: "arvin-phone.firebasestorage.app",
  messagingSenderId: "851488823602",
  appId: "1:851488823602:web:0fd531f3be832de2e45f2b",
};
  
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  const productsRef = database.ref('products');

  const grid = document.getElementById('productGrid');
  const WHATSAPP_NUMBER = '62895611324747'; // Ganti dengan nomor WhatsApp

  function renderStore(snapshot) {
    const data = snapshot.val();
    grid.innerHTML = '';
    
    if (!data) {
      grid.innerHTML = '<div class="empty-message">Belum ada produk. Segera hadir!!. </div>';
      return;
    }

    const entries = Object.entries(data);
    entries.forEach(([id, product]) => {
      const { image, title, price, description } = product;
      
      const card = document.createElement('div');
      card.className = 'product-card';
      
      const img = document.createElement('img');
      img.className = 'product-img';
      img.src = image || 'https://placehold.co/600x600/1d1d1f/fff?text=ARVIN';
      img.alt = title || 'Arvin Phone';
      img.onerror = () => { img.src = 'https://placehold.co/600x600/1a1a1a/eee?text=ARVIN'; };
      
      const titleEl = document.createElement('div');
      titleEl.className = 'product-title';
      titleEl.textContent = title || 'Arvin Phone';
      
      const priceEl = document.createElement('div');
      priceEl.className = 'product-price';
      priceEl.textContent = price || '—';
      
      const descEl = document.createElement('div');
      descEl.className = 'product-desc';
      descEl.textContent = description || 'Desain elegan, performa handal.';
      
      const waLink = document.createElement('a');
      waLink.className = 'wa-btn';
      waLink.target = '_blank';
      waLink.rel = 'noopener noreferrer';
      
      const message = `Halo, saya ingin membeli ${title}`;
      const encodedMsg = encodeURIComponent(message);
      waLink.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodedMsg}`;
      waLink.textContent = '💬 Beli via WhatsApp';
      
      card.appendChild(img);
      card.appendChild(titleEl);
      card.appendChild(priceEl);
      card.appendChild(descEl);
      card.appendChild(waLink);
      
      grid.appendChild(card);
    });
  }

  productsRef.on('value', (snap) => renderStore(snap), (error) => {
    grid.innerHTML = `<div class="empty-message">⚠️ Error: ${error.message}</div>`;
  });
</script>
</body>
</html>
