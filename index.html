<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>Arvin Phone — Premium Collection</title>
  
  <!-- Premium Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  
  <style>
    /* ============================================
       DESIGN SYSTEM — 8px GRID
       ============================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #000000;
      --bg-surface: #0a0a0a;
      --bg-elevated: #141414;
      --bg-glass: rgba(10, 10, 10, 0.9);
      --border-subtle: rgba(255, 255, 255, 0.08);
      --border-medium: rgba(255, 255, 255, 0.12);
      --border-glow: rgba(255, 255, 255, 0.2);
      --text-primary: #ffffff;
      --text-secondary: #a1a1a1;
      --text-tertiary: #6b6b6b;
      --accent-glow: rgba(255, 255, 255, 0.15);
      --space-8: 8px;
      --space-12: 12px;
      --space-16: 16px;
      --space-20: 20px;
      --space-24: 24px;
      --space-32: 32px;
      --space-40: 40px;
      --space-48: 48px;
      --space-64: 64px;
      --space-80: 80px;
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;
      --radius-full: 9999px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ============================================
       PAGE LOAD ANIMATION
       ============================================ */
    .page-loader {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      animation: loaderFadeOut 0.5s ease-out 2s forwards;
    }

    .loader-logo {
      width: 120px;
      height: 120px;
      border-radius: var(--radius-lg);
      object-fit: cover;
      animation: logoReveal 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes logoReveal {
      0% { opacity: 0; transform: scale(0.85); }
      40% { opacity: 1; transform: scale(1.02); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes loaderFadeOut {
      0% { opacity: 1; visibility: visible; }
      100% { opacity: 0; visibility: hidden; }
    }

    /* ============================================
       STAGGERED ANIMATIONS
       ============================================ */
    .animate-in {
      opacity: 0;
      animation: fadeUp 0.7s ease-out forwards;
    }

    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(24px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ============================================
       LAYOUT
       ============================================ */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 var(--space-24);
    }

    /* ============================================
       NAVBAR — GLASS MORPHISM
       ============================================ */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border-subtle);
      padding: var(--space-16) 0;
    }

    .navbar-content {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 var(--space-24);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-wrapper {
      display: flex;
      align-items: center;
      gap: var(--space-12);
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      object-fit: cover;
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text-primary);
    }

    /* ============================================
       HERO SECTION
       ============================================ */
    .hero {
      text-align: center;
      padding: var(--space-64) 0 var(--space-40);
    }

    .hero-logo {
      width: 100px;
      height: 100px;
      border-radius: var(--radius-lg);
      object-fit: cover;
      margin-bottom: var(--space-24);
      animation: logoReveal 1s ease-out;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: var(--space-12);
      background: linear-gradient(135deg, #fff 0%, #c0c0c0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(0.95rem, 2vw, 1.2rem);
      color: var(--text-secondary);
      font-weight: 400;
      letter-spacing: -0.01em;
      max-width: 500px;
      margin: 0 auto;
    }

    /* ============================================
       PRODUCT GRID — ROUNDED EVERYTHING
       ============================================ */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-24);
      margin: var(--space-32) 0 var(--space-64);
    }

    .product-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: var(--space-20);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      opacity: 0;
      animation: cardFadeUp 0.6s ease-out forwards;
      backdrop-filter: blur(10px);
    }

    .product-card:nth-child(1) { animation-delay: 0.1s; }
    .product-card:nth-child(2) { animation-delay: 0.2s; }
    .product-card:nth-child(3) { animation-delay: 0.3s; }
    .product-card:nth-child(4) { animation-delay: 0.4s; }
    .product-card:nth-child(5) { animation-delay: 0.5s; }
    .product-card:nth-child(6) { animation-delay: 0.6s; }
    .product-card:nth-child(7) { animation-delay: 0.7s; }
    .product-card:nth-child(8) { animation-delay: 0.8s; }

    @keyframes cardFadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .product-card:hover {
      transform: translateY(-4px);
      border-color: var(--border-glow);
      box-shadow: 0 24px 48px -24px rgba(0, 0, 0, 0.6);
      background: var(--bg-elevated);
    }

    .product-image {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: var(--radius-md);
      background: var(--bg-elevated);
      margin-bottom: var(--space-16);
      border: 1px solid var(--border-subtle);
    }

    .product-title {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: var(--space-8);
      color: var(--text-primary);
      line-height: 1.3;
    }

    .product-price {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: var(--space-8);
      background: linear-gradient(135deg, #ffffff 0%, #b0b0b0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .product-description {
      color: var(--text-secondary);
      font-size: 0.85rem;
      line-height: 1.5;
      margin-bottom: var(--space-20);
      flex: 1;
    }

    /* ============================================
       WHATSAPP BUTTON — FULL ROUNDED
       ============================================ */
    .wa-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-8);
      background: var(--text-primary);
      color: var(--bg-primary);
      padding: 12px var(--space-20);
      border-radius: var(--radius-full);
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: -0.01em;
      text-decoration: none;
      transition: var(--transition);
      border: none;
      cursor: pointer;
      font-family: inherit;
      margin-top: auto;
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.08);
    }

    .wa-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px -8px rgba(255, 255, 255, 0.15);
      background: #f0f0f0;
    }

    /* ============================================
       EMPTY STATE
       ============================================ */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: var(--space-64) var(--space-24);
      color: var(--text-tertiary);
      font-size: 1rem;
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-subtle);
    }

    /* ============================================
       FOOTER
       ============================================ */
    .footer {
      text-align: center;
      padding: var(--space-40) 0 var(--space-32);
      color: var(--text-tertiary);
      font-size: 0.8rem;
      border-top: 1px solid var(--border-subtle);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ============================================
       RESPONSIVE
       ============================================ */
    @media (max-width: 1024px) {
      .product-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 768px) {
      .container {
        padding: 0 var(--space-16);
      }
      
      .navbar-content {
        padding: 0 var(--space-16);
      }
      
      .product-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: var(--space-16);
      }
      
      .hero {
        padding: var(--space-40) 0 var(--space-32);
      }
      
      .hero-logo {
        width: 80px;
        height: 80px;
      }
    }

    @media (max-width: 480px) {
      .product-grid {
        grid-template-columns: 1fr;
      }
      
      .logo-text {
        font-size: 1.2rem;
      }
      
      .logo-icon {
        width: 36px;
        height: 36px;
      }
      
      .hero-logo {
        width: 70px;
        height: 70px;
      }
    }

    /* Utilities */
    .text-center { text-align: center; }
  </style>
</head>
<body>

<!-- Page Loader -->
<div class="page-loader">
  <img src="arvin.jpg" alt="Arvin" class="loader-logo">
</div>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar-content">
    <div class="logo-wrapper">
      <img src="arvin.jpg" alt="Arvin" class="logo-icon">
      <span class="logo-text">ARVIN PHONE</span>
    </div>
  </div>
</nav>

<!-- Hero Section -->
<section class="hero">
  <div class="container">
    <img src="arvin.jpg" alt="Arvin" class="hero-logo animate-in delay-1">
    <h1 class="animate-in delay-2">Esensi dalam Genggaman</h1>
    <p class="hero-subtitle animate-in delay-3">Desain minimalis. Performa maksimal. Pengalaman premium.</p>
  </div>
</section>

<!-- Product Grid -->
<main class="container">
  <div id="productGrid" class="product-grid">
    <div class="empty-state">Memuat koleksi premium...</div>
  </div>
</main>

<!-- Footer -->
<footer class="footer">
  <div class="container">
    <p>© 2024 Arvin Phone. Semua hak dilindungi.</p>
  </div>
</footer>

<script>
  // ============================================
  // FIREBASE CONFIGURATION
  // ============================================
  const firebaseConfig = {
  apiKey: "AIzaSyBc9IX_AEFDNyiA2Klm4RGdbHYmqfXEbOc",
  authDomain: "arvin-phone.firebaseapp.com",
  databaseURL: "https://arvin-phone-default-rtdb.firebaseio.com",
  projectId: "arvin-phone",
  storageBucket: "arvin-phone.firebasestorage.app",
  messagingSenderId: "851488823602",
  appId: "1:851488823602:web:0fd531f3be832de2e45f2b",
};
  
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  const productsRef = database.ref('products');
  
  // ============================================
  // CONFIGURATION
  // ============================================
  const WHATSAPP_NUMBER = '62895611324747'; // Ganti dengan nomor WhatsApp Anda
  const gridContainer = document.getElementById('productGrid');
  
  // ============================================
  // RENDER PRODUCTS
  // ============================================
  function renderStore(snapshot) {
    const data = snapshot.val();
    gridContainer.innerHTML = '';
    
    if (!data) {
      gridContainer.innerHTML = '<div class="empty-state">✨ Koleksi premium akan segera hadir.</div>';
      return;
    }
    
    const entries = Object.entries(data);
    
    entries.forEach(([id, product]) => {
      const card = document.createElement('div');
      card.className = 'product-card';
      
      // Product Image
      const img = document.createElement('img');
      img.className = 'product-image';
      img.src = product.image || 'https://placehold.co/600x600/141414/ffffff?text=ARVIN';
      img.alt = product.title || 'Arvin Phone';
      img.loading = 'lazy';
      img.onerror = () => { img.src = 'https://placehold.co/600x600/141414/ffffff?text=ARVIN'; };
      
      // Product Title
      const title = document.createElement('h3');
      title.className = 'product-title';
      title.textContent = product.title || 'Arvin Phone';
      
      // Product Price
      const price = document.createElement('div');
      price.className = 'product-price';
      price.textContent = product.price || 'Hubungi untuk harga';
      
      // Product Description
      const desc = document.createElement('p');
      desc.className = 'product-description';
      desc.textContent = product.description || 'Smartphone premium dengan desain elegan dan performa handal.';
      
      // WhatsApp Button
      const waButton = document.createElement('a');
      waButton.className = 'wa-button';
      waButton.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(`Halo, saya ingin membeli ${product.title}`)}`;
      waButton.target = '_blank';
      waButton.rel = 'noopener noreferrer';
      waButton.innerHTML = '💬 Beli via WhatsApp';
      
      // Assemble card
      card.appendChild(img);
      card.appendChild(title);
      card.appendChild(price);
      card.appendChild(desc);
      card.appendChild(waButton);
      
      gridContainer.appendChild(card);
    });
  }
  
  // ============================================
  // FIREBASE LISTENER
  // ============================================
  productsRef.on('value', renderStore, (error) => {
    gridContainer.innerHTML = `<div class="empty-state">⚠️ Terjadi kesalahan: ${error.message}</div>`;
  });
</script>

</body>
</html>
