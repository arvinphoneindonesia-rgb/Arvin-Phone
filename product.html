<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Detail Produk | ARVIN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFFFFF;
            color: #000000;
            font-family: 'Inter', 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.4;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700;800&display=swap');

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(24px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
        }

        .navbar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 28px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 40px;
        }

        .logo {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            text-decoration: none;
            color: #000;
            transition: opacity 0.2s ease;
        }
        .logo:hover {
            opacity: 0.7;
        }

        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 64px;
            align-items: start;
            padding: 20px 0 80px;
            animation: fadeUp 0.6s ease-out forwards;
        }

        .product-image {
            background: #F9F9F9;
            border-radius: 32px;
            padding: 48px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        .product-image:hover {
            transform: scale(0.99);
        }
        .product-image img {
            max-width: 100%;
            width: 280px;
            height: auto;
            border-radius: 28px;
            filter: drop-shadow(0 12px 18px rgba(0,0,0,0.1));
        }

        .product-info {
            padding-right: 12px;
        }
        .product-name {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }
        .product-price {
            font-family: 'Inter', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 28px;
        }
        .desc-list {
            list-style: none;
            margin: 28px 0 32px;
        }
        .desc-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 500;
        }
        .desc-list li::before {
            content: "✓";
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #000;
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
        }
        .warranty-box {
            background: #F7F7F7;
            border-radius: 24px;
            padding: 20px 24px;
            margin: 32px 0 40px;
            border: 1px solid #eaeaea;
        }
        .warranty-box p {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 1rem;
        }
        .warranty-box small {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 0.85rem;
            color: #3a3a3a;
            display: block;
        }
        .btn-buy {
            display: inline-block;
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            padding: 16px 40px;
            border-radius: 44px;
            text-decoration: none;
            transition: all 0.25s ease;
            border: 1px solid #000;
            width: 100%;
            text-align: center;
        }
        .btn-buy:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 10px 18px rgba(0,0,0,0.05);
            transform: translateY(-2px);
        }

        .back-link {
            display: inline-block;
            margin-bottom: 24px;
            font-family: 'Inter', sans-serif;
            text-decoration: none;
            color: #000;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .back-link:hover {
            opacity: 0.6;
        }

        .footer {
            text-align: center;
            padding: 48px 20px 40px;
            border-top: 1px solid #efefef;
            margin-top: 40px;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            color: #2c2c2c;
        }

        @media (max-width: 880px) {
            .product-grid {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            .container {
                padding: 0 24px;
            }
            .product-name {
                font-size: 1.8rem;
            }
            .product-price {
                font-size: 1.6rem;
            }
        }
        @media (max-width: 540px) {
            .navbar {
                padding: 20px 0;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <nav class="navbar">
        <a href="index.html" class="logo">ARVIN</a>
    </nav>

    <a href="catalog.html" class="back-link">← Kembali ke Katalog</a>

    <div class="product-grid" id="productDetail">
        <div class="product-image">
            <img id="productImg" src="https://www.netcomputer.id/wp-content/uploads/2022/06/20220613_185123.jpg" alt="Laptop Asus A42F">
        </div>
        <div class="product-info">
            <h1 class="product-name" id="productName">Laptop Asus A42F</h1>
            <div class="product-price" id="productPrice">Rp 1.450.000</div>
            <ul class="desc-list" id="productFeatures">
                <li>Original & Bergaransi</li>
                <li>No Baterai</li>
                <li>Cas Ada ( Original )</li>
                <li>Semua fungsi aman</li>
            </ul>
            <div class="warranty-box">
                <p>Garansi 1 hari</p>
                <small>*Dapat dikembalikan jika bukan human error</small>
            </div>
            <a href="#" id="buyNowBtn" class="btn-buy">BUY NOW</a>
        </div>
    </div>
</div>

<footer class="footer">
    ARVIN PHONE INDONESIA
</footer>

<script>
    // Data produk (1 produk saja)
    const products = {
        1: {
            name: "Laptop Asus A42F",
            price: "Rp 1.450.000",
            image: "https://www.netcomputer.id/wp-content/uploads/2022/06/20220613_185123.jpg",
            features: [
                "Original & Bergaransi",
                "No Baterai",
                "Cas Ada ( Original )",
                "Semua fungsi aman"
            ],
            warranty: "Garansi 1 hari",
            warrantyNote: "*Dapat dikembalikan jika bukan human error",
            waMessage: "Halo ARVIN, saya ingin membeli Laptop Asus A42F"
        }
    };

    // Ambil parameter ID dari URL
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');

    let currentProduct = products[1]; // default

    if (productId && products[productId]) {
        currentProduct = products[productId];
    }

    // Update DOM dengan data produk
    document.getElementById('productName').innerText = currentProduct.name;
    document.getElementById('productPrice').innerText = currentProduct.price;
    document.getElementById('productImg').src = currentProduct.image;
    document.getElementById('productImg').alt = currentProduct.name;

    // Update features list
    const featuresList = document.getElementById('productFeatures');
    featuresList.innerHTML = '';
    currentProduct.features.forEach(feature => {
        const li = document.createElement('li');
        li.innerText = feature;
        featuresList.appendChild(li);
    });

    // Update warranty box
    const warrantyBox = document.querySelector('.warranty-box');
    warrantyBox.innerHTML = `
        <p>✓ ${currentProduct.warranty}</p>
        <small>${currentProduct.warrantyNote}</small>
    `;

    // Set tombol WhatsApp
    const buyBtn = document.getElementById('buyNowBtn');
    const phoneNumber = '62895611324747';
    const waMessage = encodeURIComponent(currentProduct.waMessage);
    buyBtn.href = `https://wa.me/${phoneNumber}?text=${waMessage}`;
</script>

</body>
</html>
