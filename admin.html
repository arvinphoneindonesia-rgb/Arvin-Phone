<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Arvin Phone · Admin</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      color: #000000;
      line-height: 1.5;
      min-height: 100vh;
      opacity: 0;
      animation: contentFadeIn 0.8s ease-out 2.3s forwards;
    }

    @keyframes contentFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* Splash Screen */
    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: splashFadeOut 0.6s ease-in-out 2.2s forwards;
      pointer-events: none;
    }

    #splash img {
      width: 160px;
      height: auto;
      object-fit: contain;
      filter: brightness(0) invert(1);
      animation: logoZoomFade 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes logoZoomFade {
      0% { opacity: 0; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.05); }
      70% { opacity: 1; transform: scale(1); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes splashFadeOut {
      0% { opacity: 1; visibility: visible; }
      100% { opacity: 0; visibility: hidden; }
    }

    /* Navbar */
    .navbar {
      background: #ffffff;
      border-bottom: 1px solid #e5e5e5;
      padding: 1.2rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #000000;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .logo img {
      height: 28px;
      width: auto;
      filter: brightness(0);
    }

    .badge-admin {
      background: #000000;
      color: #ffffff;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      margin-left: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 2rem;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      font-weight: 300;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .section-title {
      font-size: 2rem;
      font-weight: 300;
      margin: 3.5rem 0 2rem;
      letter-spacing: -0.02em;
      text-align: center;
    }

    /* Form Card */
    .form-card {
      background: #fafafa;
      border-radius: 32px;
      padding: 2.5rem 2.5rem 2.8rem;
      border: 1px solid #e8e8e8;
      max-width: 700px;
      margin: 0 auto;
      text-align: center;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      text-align: left;
    }

    label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666666;
      text-align: center;
    }

    input, textarea {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      border: 1.5px solid #e0e0e0;
      border-radius: 16px;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      color: #000000;
      transition: all 0.2s ease;
      outline: none;
      text-align: center;
    }

    textarea {
      text-align: left;
    }

    input:focus, textarea:focus {
      border-color: #000000;
      background: #ffffff;
    }

    .btn {
      background: #000000;
      color: #ffffff;
      border: none;
      border-radius: 50px;
      padding: 1rem 2.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 1.5px solid #000000;
      margin-top: 0.5rem;
    }

    .btn:hover {
      background: #333333;
      border-color: #333333;
      transform: scale(1.02);
    }

    .btn-outline {
      background: transparent;
      color: #000000;
      border: 1.5px solid #cccccc;
    }

    .btn-outline:hover {
      background: #000000;
      color: #ffffff;
      border-color: #000000;
    }

    .btn-small {
      padding: 0.6rem 1.5rem;
      font-size: 0.75rem;
      border-radius: 30px;
    }

    .edit-hint {
      color: #888888;
      font-size: 0.85rem;
      margin-left: 1rem;
      font-weight: 400;
    }

    /* Product Grid */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
      margin-top: 1rem;
    }

    .product-card {
      background: #ffffff;
      border-radius: 28px;
      padding: 2rem 1.8rem;
      border: 1px solid #e5e5e5;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: flex;
      flex-direction: column;
      text-align: center;
    }

    .product-card:hover {
      transform: translateY(-4px);
      border-color: #000000;
      box-shadow: 0 20px 30px -10px rgba(0,0,0,0.03);
    }

    .product-img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 20px;
      background: #f5f5f5;
      margin-bottom: 1.5rem;
      border: 1px solid #eeeeee;
    }

    .product-title {
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
      text-align: center;
    }

    .product-price {
      font-size: 1.6rem;
      font-weight: 300;
      margin-bottom: 1rem;
      color: #000000;
      text-align: center;
    }

    .product-desc {
      color: #666666;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      line-height: 1.6;
      flex: 1;
      text-align: center;
    }

    .action-bar {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .edit-form {
      margin-top: 1.5rem;
      border-top: 1px solid #e5e5e5;
      padding-top: 1.5rem;
      text-align: left;
    }

    .inline-input {
      margin-bottom: 1rem;
    }

    .inline-input input, .inline-input textarea {
      text-align: left;
    }

    .empty-message {
      text-align: center;
      padding: 4rem;
      color: #999999;
      font-weight: 300;
      font-size: 1.1rem;
    }

    /* Center align all text */
    p, .status-text {
      text-align: center;
    }

    .flex-center {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Responsive */
    @media (max-width: 700px) {
      .navbar { padding: 1rem; }
      .container { padding: 2rem 1.2rem; }
      h1 { font-size: 2.2rem; }
      .form-card { padding: 1.8rem; }
      .product-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<!-- Splash logo -->
<div id="splash">
  <img src="arvin.jpg" alt="Arvin Logo">
</div>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar-container">
    <a href="#" class="logo">
      <img src="arvin.jpg" alt="Arvin">
      ARVIN PHONE
      <span class="badge-admin">ADMIN</span>
    </a>
  </div>
</nav>

<main class="container">
  <h1>Panel Admin</h1>
  <p style="margin-bottom: 2rem; color: #666;">Kelola produk dengan mudah</p>
  
  <!-- Form Tambah/Ubah Produk -->
  <div class="form-card">
    <div class="form-grid">
      <div class="input-group">
        <label>📷 URL Gambar</label>
        <input type="text" id="prodImage" placeholder="Masukan URL">
      </div>
      <div class="input-group">
        <label>📱 Nama Produk</label>
        <input type="text" id="prodTitle" placeholder="Nama Produk">
      </div>
      <div class="input-group">
        <label>💰 Harga</label>
        <input type="text" id="prodPrice" placeholder="Harga Produk">
      </div>
      <div class="input-group">
        <label>📝 Deskripsi</label>
        <textarea id="prodDesc" placeholder="Deskripsi produk"></textarea>
      </div>
    </div>
    <div style="display: flex; align-items: center; justify-content: center; margin-top: 2rem; gap: 1.5rem; flex-wrap: wrap;">
      <button class="btn" id="uploadBtn">📤 Tambah Produk</button>
      <span id="editHint" class="edit-hint"></span>
    </div>
  </div>

  <!-- Manajemen Produk -->
  <h2 class="section-title">Manajemen Produk</h2>
  <div id="productListContainer" class="product-grid">
    <div class="empty-message">Memuat produk...</div>
  </div>
</main>

<script>
  // ---------- FIREBASE CONFIG (PLACEHOLDER) ----------
const firebaseConfig = {
  apiKey: "AIzaSyBc9IX_AEFDNyiA2Klm4RGdbHYmqfXEbOc",
  authDomain: "arvin-phone.firebaseapp.com",
  databaseURL: "https://arvin-phone-default-rtdb.firebaseio.com",
  projectId: "arvin-phone",
  storageBucket: "arvin-phone.firebasestorage.app",
  messagingSenderId: "851488823602",
  appId: "1:851488823602:web:0fd531f3be832de2e45f2b",
};
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  const productsRef = database.ref('products');

  // DOM elements
  const imgInp = document.getElementById('prodImage');
  const titleInp = document.getElementById('prodTitle');
  const priceInp = document.getElementById('prodPrice');
  const descInp = document.getElementById('prodDesc');
  const uploadBtn = document.getElementById('uploadBtn');
  const editHint = document.getElementById('editHint');
  const container = document.getElementById('productListContainer');

  let currentEditId = null;

  function resetForm() {
    imgInp.value = '';
    titleInp.value = '';
    priceInp.value = '';
    descInp.value = '';
    currentEditId = null;
    editHint.textContent = '';
    uploadBtn.textContent = '📤 Tambah Produk';
  }

  function renderProducts(snapshot) {
    const data = snapshot.val();
    container.innerHTML = '';
    
    if (!data) {
      container.innerHTML = '<div class="empty-message">Belum ada produk</div>';
      return;
    }

    const entries = Object.entries(data);
    entries.forEach(([id, product]) => {
      const { image, title, price, description } = product;
      
      const card = document.createElement('div');
      card.className = 'product-card';
      card.setAttribute('data-id', id);
      
      const img = document.createElement('img');
      img.className = 'product-img';
      img.src = image || 'https://placehold.co/400x400/1d1d1f/fff?text=ARVIN';
      img.alt = title || 'Arvin';
      img.onerror = () => { img.src = 'https://placehold.co/400x400/1a1a1a/eee?text=ARVIN'; };
      
      const titleEl = document.createElement('div');
      titleEl.className = 'product-title';
      titleEl.textContent = title || 'Tanpa Judul';
      
      const priceEl = document.createElement('div');
      priceEl.className = 'product-price';
      priceEl.textContent = price || '—';
      
      const descEl = document.createElement('div');
      descEl.className = 'product-desc';
      descEl.textContent = description || '';
      
      const actionDiv = document.createElement('div');
      actionDiv.className = 'action-bar';
      
      const editBtn = document.createElement('button');
      editBtn.className = 'btn-outline btn-small';
      editBtn.textContent = '✎ Ubah';
      
      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'btn-outline btn-small';
      deleteBtn.textContent = '🗑 Hapus';
      deleteBtn.style.color = '#c00';
      deleteBtn.style.borderColor = '#c00';
      
      actionDiv.appendChild(editBtn);
      actionDiv.appendChild(deleteBtn);
      
      const editFormDiv = document.createElement('div');
      editFormDiv.className = 'edit-form';
      editFormDiv.style.display = 'none';
      editFormDiv.innerHTML = `
        <div class="input-group inline-input">
          <label>URL Gambar</label>
          <input type="text" class="edit-img" value="${image || ''}" placeholder="URL Gambar">
        </div>
        <div class="input-group inline-input">
          <label>Nama</label>
          <input type="text" class="edit-title" value="${title || ''}">
        </div>
        <div class="input-group inline-input">
          <label>Harga</label>
          <input type="text" class="edit-price" value="${price || ''}">
        </div>
        <div class="input-group inline-input">
          <label>Deskripsi</label>
          <textarea class="edit-desc" rows="2">${description || ''}</textarea>
        </div>
        <div style="display:flex; gap:0.8rem; justify-content: center;">
          <button class="btn-small btn save-edit-btn">✓ Simpan</button>
          <button class="btn-small btn-outline cancel-edit-btn">✕ Batal</button>
        </div>
      `;
      
      card.appendChild(img);
      card.appendChild(titleEl);
      card.appendChild(priceEl);
      card.appendChild(descEl);
      card.appendChild(actionDiv);
      card.appendChild(editFormDiv);
      
      container.appendChild(card);
      
      editBtn.addEventListener('click', () => {
        document.querySelectorAll('.edit-form').forEach(ef => ef.style.display = 'none');
        editFormDiv.style.display = 'block';
      });
      
      editFormDiv.querySelector('.cancel-edit-btn').addEventListener('click', () => {
        editFormDiv.style.display = 'none';
      });
      
      editFormDiv.querySelector('.save-edit-btn').addEventListener('click', async () => {
        const newImg = editFormDiv.querySelector('.edit-img').value.trim();
        const newTitle = editFormDiv.querySelector('.edit-title').value.trim();
        const newPrice = editFormDiv.querySelector('.edit-price').value.trim();
        const newDesc = editFormDiv.querySelector('.edit-desc').value.trim();
        
        if (!newTitle || !newPrice) {
          alert('Nama dan harga wajib diisi');
          return;
        }
        try {
          await productsRef.child(id).update({ image: newImg, title: newTitle, price: newPrice, description: newDesc });
          editFormDiv.style.display = 'none';
          if (currentEditId === id) resetForm();
        } catch (err) {
          alert('Gagal memperbarui: ' + err.message);
        }
      });
      
      deleteBtn.addEventListener('click', async () => {
        if (!confirm(`Hapus "${title}"?`)) return;
        try {
          await productsRef.child(id).remove();
          if (currentEditId === id) resetForm();
        } catch (err) {
          alert('Gagal menghapus: ' + err.message);
        }
      });
      
      editBtn.addEventListener('dblclick', () => {
        imgInp.value = image || '';
        titleInp.value = title || '';
        priceInp.value = price || '';
        descInp.value = description || '';
        currentEditId = id;
        editHint.textContent = `✏️ Mengubah: ${title}`;
        uploadBtn.textContent = '✏️ Perbarui Produk';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  productsRef.on('value', (snap) => renderProducts(snap), (error) => {
    container.innerHTML = `<div class="empty-message">Error: ${error.message}</div>`;
  });

  uploadBtn.addEventListener('click', async () => {
    const image = imgInp.value.trim();
    const title = titleInp.value.trim();
    const price = priceInp.value.trim();
    const description = descInp.value.trim();
    
    if (!title || !price) {
      alert('Nama produk dan harga wajib diisi.');
      return;
    }
    const productData = { image, title, price, description };
    try {
      if (currentEditId) {
        await productsRef.child(currentEditId).update(productData);
      } else {
        await productsRef.push(productData);
      }
      resetForm();
    } catch (err) {
      alert('Gagal: ' + err.message);
    }
  });
  
  resetForm();
</script>
</body>
</html>
